<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
    body{
font-family:Arial;
background: linear-gradient(135deg,#84fab0,#8fd3f4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.2);
width:350px;
text-align:center;
}

h2{
color:#1565c0;
margin-bottom:25px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
background:#1565c0;
color:white;
padding:12px 30px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0d47a1;
}

.message{
color:red;
margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
<h2>User Login</h2>

{% if messages %}
{% for message in messages %}
<p class="message">{{message}}</p>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">

<br><br>
<button type="submit">Login</button>

</form>

</div>

</body>
</html>
