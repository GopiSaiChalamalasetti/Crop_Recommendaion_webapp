<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family:Arial;
background: linear-gradient(135deg,#d4fc79,#96e6a1);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.2);
width:400px;
text-align:center;
}
h2{color:#2e7d32;}
p{color:#555;line-height:1.6;}
input{width:90%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:10px;}
button{background:#2e7d32;color:white;padding:12px 30px;border:none;border-radius:10px;}
.message{color:red;}
</style>
</head>
<body>
<div class="container">
<h2>User Login</h2>
<p>Login to access the prediction dashboard and generate crop recommendations.</p>
{% if messages %}{% for message in messages %}<p class='message'>{{message}}</p>{% endfor %}{% endif %}
<form method="POST">
{% csrf_token %}
<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button type="submit">Login</button>
</form>
</div>
</body>
</html>
