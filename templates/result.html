<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis Results | SmartAgri</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f0fdf4; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 30px 20px; }
    .card {
        background: #ffffff; padding: 45px 40px; border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.04); width: 100%; max-width: 550px;
        animation: fadeUp 0.5s ease-out;
    }
    .header { text-align: center; margin-bottom: 35px; }
    h2 { color: #065f46; font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
    p { color: #6b7280; font-size: 1rem; line-height: 1.6; }
    
    .result-item { margin-bottom: 25px; }
    .result-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
    .crop-name { font-size: 1.2rem; font-weight: 700; color: #1f2937; text-transform: capitalize; }
    .crop-prob { font-size: 0.95rem; font-weight: 600; color: #059669; }
    
    /* Dynamic Progress Bar */
    .progress-track { width: 100%; height: 10px; background: #e5e7eb; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: #10b981; border-radius: 10px; transition: width 1s ease-in-out; }
    
    .btn {
        display: block; width: 100%; text-align: center; background: #059669; color: white; padding: 16px; border: none;
        border-radius: 10px; font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-decoration: none; margin-top: 40px;
    }
    .btn:hover { background: #047857; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="card">
    <div class="header">
        <h2>Analysis Complete</h2>
        <p>Based on your field conditions, here are the top 3 crops with the highest probability of success.</p>
    </div>
    
    <div class="results-list">
        {% for crop, prob in top3 %}
        <div class="result-item">
            <div class="result-header">
                <span class="crop-name">{{crop}}</span>
                <span class="crop-prob">{{prob}}% Match</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" style="width: 0;" onload="this.style.width='{{prob}}%';"></div>
            </div>
        </div>
        {% endfor %}
    </div>

    <a href="/predict/" class="btn">Analyze Another Plot</a>
</div>
</body>
</html>
