<!DOCTYPE html>
<html>
<head>
<title>Crop Prediction</title>
<style>
body{
    font-family:Arial;
background:#f1f8e9;
text-align:center;
padding-top:40px;
}

.container{
background:white;
width:500px;
margin:auto;
padding:35px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

input{
width:85%;
padding:12px;
margin:8px;
border:1px solid #ccc;
border-radius:10px;
}

button{
background:#388e3c;
color:white;
padding:14px 30px;
border:none;
border-radius:10px;
font-size:16px;
}
</style>
</head>
<body>

<div class="container">
<h2>Enter Soil Details</h2>

<form method="POST">
{% csrf_token %}

<input name="N" placeholder="Nitrogen" required>
<input name="P" placeholder="Phosphorus" required>
<input name="K" placeholder="Potassium" required>
<input name="temperature" placeholder="Temperature" required>
<input name="humidity" placeholder="Humidity" required>
<input name="ph" placeholder="pH" required>
<input name="rainfall" placeholder="Rainfall" required>

<br><br>
<button type="submit">Predict Crop</button>

</form>
</div>

</body>
</html>
