<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
font-family:Arial;
background: linear-gradient(135deg,#d4fc79,#96e6a1);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.2);
width:350px;
text-align:center;
}

h2{
color:#2e7d32;
margin-bottom:25px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
background:#2e7d32;
color:white;
padding:12px 30px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1b5e20;
}

a{
text-decoration:none;
color:#1565c0;
}

.message{
color:red;
margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
<h2>Create Account</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username">
<input type="email" name="email" placeholder="Email">
<input type="password" name="password" placeholder="Password">

<br><br>
<button type="submit">Register</button>

</form>

<br>
<a href="/login/">Already have account? Login</a>

{% if messages %}
{% for message in messages %}
<p class="message">{{message}}</p>
{% endfor %}
{% endif %}

</div>

</body>
</html>
